<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пам'ять — мережева гра (Minecraft)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧠%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;500&family=Syne:wght@600;800&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f1a;
    --bg2: #111623;
    --bg3: #161c2e;
    --border: #1e2740;
    --border2: #2a3555;
    --text: #e8eaf0;
    --text2: #8892aa;
    --text3: #5a6480;
    --accent: #f0a500;
    --p1: #5b8dee;
    --p2: #3dd9b3;
    --tie: #a586d6;
    --error: #e05252;
    --win: #f0a500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  .topbar {
    width: 100%;
    max-width: 460px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .topbar a { color: var(--text3); text-decoration: none; }
  .topbar a:hover { color: var(--accent); }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin: 8px 0 4px;
    text-align: center;
  }
  .sub {
    color: var(--text2);
    font-size: 12px;
    margin-bottom: 18px;
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
  .sub code {
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--accent);
  }

  /* — name entry — */
  .name-entry {
    width: 100%;
    max-width: 380px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    margin-top: 30px;
    text-align: center;
  }
  .name-entry h2 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .name-entry input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }
  .name-entry input:focus { outline: none; border-color: var(--accent); }
  .name-entry button {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .05em;
    cursor: pointer;
  }
  .name-entry .hint {
    font-size: 10px;
    color: var(--text3);
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
  }

  .game {
    width: 100%;
    max-width: 460px;
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .game.active { display: flex; }

  .scoreboard {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .score-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
  }
  .score-card.mine { border-color: var(--accent); }
  .score-card .name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .score-card.p1 .name { color: var(--p1); }
  .score-card.p2 .name { color: var(--p2); }
  .score-card .val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--text);
  }
  .score-card .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .status-bar {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
    text-align: center;
    font-size: 14px;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .status-bar.your-turn {
    background: rgba(240, 165, 0, .08);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .status-bar.waiting { color: var(--text2); }
  .status-bar.over.win {
    background: rgba(240, 165, 0, .1);
    border-color: var(--win);
    color: var(--win);
    font-weight: 700;
  }
  .status-bar.over.tie {
    background: rgba(165, 134, 214, .1);
    border-color: var(--tie);
    color: var(--tie);
    font-weight: 600;
  }
  .status-bar.over.lose { color: var(--text2); }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    width: 100%;
    aspect-ratio: 1;
    margin-bottom: 14px;
  }
  .card {
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: transform .15s, border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .card.facedown::before {
    content: '?';
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--text3);
  }
  .card.facedown.can-flip {
    border-color: var(--border2);
  }
  .card.facedown.can-flip:hover {
    transform: scale(1.04);
    background: var(--bg3);
    border-color: var(--accent);
  }
  .card.facedown:not(.can-flip) {
    cursor: not-allowed;
  }
  .card.face {
    font-size: 36px;
    line-height: 1;
  }
  .card.peek {
    border-color: var(--accent);
    background: rgba(240, 165, 0, .07);
    animation: pulse .8s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { box-shadow: 0 0 0 0 rgba(240,165,0,.25); }
    to   { box-shadow: 0 0 0 6px rgba(240,165,0,0); }
  }
  .card.owned-p1 {
    background: rgba(91, 141, 238, .14);
    border-color: rgba(91, 141, 238, .55);
    cursor: default;
  }
  .card.owned-p2 {
    background: rgba(61, 217, 179, .14);
    border-color: rgba(61, 217, 179, .55);
    cursor: default;
  }
  @media (max-width: 380px) {
    .card.face { font-size: 28px; }
    .card.facedown::before { font-size: 22px; }
  }

  .controls {
    width: 100%;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button.ctrl {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 9px 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    cursor: pointer;
  }
  button.ctrl:hover { background: var(--bg3); border-color: var(--accent); }
  button.ctrl.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  button.ctrl.danger { color: var(--error); border-color: var(--border); }
  button.ctrl.danger:hover { background: rgba(224, 82, 82, .08); border-color: var(--error); }

  .footer {
    margin-top: 22px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/">← усі ігри</a>
  <span>кімната: <code style="background:var(--bg3);padding:1px 6px;border-radius:3px;color:var(--accent)" id="room-id">default</code></span>
</div>

<h1>🧠 Пам'ять</h1>
<div class="sub">знайди пару · додай <code>?room=ваш-код</code> для приватної кімнати</div>

<!-- name entry screen -->
<div class="name-entry" id="name-entry">
  <h2>Як тебе звати?</h2>
  <input type="text" id="name-input" placeholder="Твоє ім'я" maxlength="16" autofocus>
  <button id="join-btn">Увійти у гру</button>
  <div class="hint">2 гравці · по черзі перевертають по 2 картки · пара = ще хід</div>
</div>

<!-- main game -->
<div class="game" id="game">
  <div class="scoreboard">
    <div class="score-card p1" id="p1-card">
      <div class="name" id="p1-name">P1</div>
      <div class="val" id="p1-score">0</div>
      <div class="lbl">пар</div>
    </div>
    <div class="score-card p2" id="p2-card">
      <div class="name" id="p2-name">P2</div>
      <div class="val" id="p2-score">0</div>
      <div class="lbl">пар</div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">Завантаження…</div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="ctrl primary" id="new-btn" style="display:none">▶ Нова гра</button>
    <button class="ctrl" id="reset-btn">↻ Скинути рахунок</button>
    <button class="ctrl danger" id="leave-btn">Покинути</button>
  </div>
</div>

<div class="footer">раунд <span id="round-n">1</span></div>

<script>
  const ROOM = (new URLSearchParams(location.search).get('room') || 'default').slice(0, 40);
  document.getElementById('room-id').textContent = ROOM;

  const PLAYER_ID_KEY = 'mem-player-id';
  let playerId = localStorage.getItem(PLAYER_ID_KEY);
  if (!playerId) {
    playerId = 'p_' + Math.random().toString(36).slice(2, 12);
    localStorage.setItem(PLAYER_ID_KEY, playerId);
  }
  let mySlot = null;
  let myName = localStorage.getItem('mem-name') || '';
  let lastState = null;
  let pollTimer = null;

  const nameEntryEl = document.getElementById('name-entry');
  const gameEl = document.getElementById('game');
  const nameInput = document.getElementById('name-input');
  const joinBtn = document.getElementById('join-btn');
  const statusBar = document.getElementById('status-bar');
  const boardEl = document.getElementById('board');
  const newBtn = document.getElementById('new-btn');
  const resetBtn = document.getElementById('reset-btn');
  const leaveBtn = document.getElementById('leave-btn');
  const roundN = document.getElementById('round-n');

  if (myName) nameInput.value = myName;

  async function api(method, body = null) {
    const url = `/api/memory?room=${encodeURIComponent(ROOM)}`;
    const opts = { method, headers: {} };
    if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify({ ...body, playerId });
    }
    const res = await fetch(url, opts);
    return res.json();
  }

  // Build empty board (16 cells)
  for (let i = 0; i < 16; i++) {
    const card = document.createElement('div');
    card.className = 'card facedown';
    card.dataset.idx = i;
    card.addEventListener('click', () => onCardClick(i));
    boardEl.appendChild(card);
  }
  const cards = Array.from(boardEl.children);

  async function onCardClick(idx) {
    if (!lastState) return;
    const c = lastState.cards[idx];
    if (c.owner !== null) return;
    if (lastState.winner) return;
    if (lastState.peekTwo) return;
    if (!lastState.p1 || !lastState.p2) return;
    if (lastState.turn !== mySlot) return;
    if (lastState.peekFirst === idx) return;
    const r = await api('POST', { action: 'flip', idx });
    if (r.ok) { lastState = r.state; render(); }
    else if (r.state) { lastState = r.state; render(); }
  }

  joinBtn.addEventListener('click', joinGame);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinGame(); });

  async function joinGame() {
    const name = (nameInput.value || '').trim().slice(0, 16) || 'Гравець';
    myName = name;
    localStorage.setItem('mem-name', name);
    const r = await api('POST', { action: 'join', name });
    if (r.ok) {
      mySlot = r.slot;
      lastState = r.state;
      nameEntryEl.style.display = 'none';
      gameEl.classList.add('active');
      render();
      startPolling();
    }
  }

  newBtn.addEventListener('click', async () => {
    const r = await api('POST', { action: 'new' });
    if (r.ok) { lastState = r.state; render(); }
  });
  resetBtn.addEventListener('click', async () => {
    if (!confirm('Скинути рахунок і почати нову гру?')) return;
    const r = await api('POST', { action: 'reset' });
    if (r.ok) { lastState = r.state; render(); }
  });
  leaveBtn.addEventListener('click', async () => {
    if (!confirm('Покинути гру? Інша людина зможе зайти на твоє місце.')) return;
    stopPolling();
    await api('POST', { action: 'leave' });
    mySlot = null;
    gameEl.classList.remove('active');
    nameEntryEl.style.display = 'block';
  });

  function startPolling() {
    stopPolling();
    pollTimer = setInterval(async () => {
      const r = await api('GET');
      if (r.ok) {
        lastState = r.state;
        if (lastState.p1?.id === playerId) mySlot = 'p1';
        else if (lastState.p2?.id === playerId) mySlot = 'p2';
        else mySlot = 'observer';
        render();
      }
    }, 1300);
  }
  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  function render() {
    if (!lastState) return;
    const s = lastState;

    const p1Card = document.getElementById('p1-card');
    const p2Card = document.getElementById('p2-card');
    document.getElementById('p1-name').textContent = s.p1?.name || '—';
    document.getElementById('p2-name').textContent = s.p2?.name || '—';
    document.getElementById('p1-score').textContent = s.score.p1;
    document.getElementById('p2-score').textContent = s.score.p2;
    p1Card.classList.toggle('mine', mySlot === 'p1');
    p2Card.classList.toggle('mine', mySlot === 'p2');

    // Cards
    const peekSet = new Set(s.peekTwo || []);
    const myTurn = s.turn === mySlot && s.p1 && s.p2 && !s.winner && !s.peekTwo;
    for (let i = 0; i < 16; i++) {
      const cell = cards[i];
      const c = s.cards[i];
      const isPeekFirst = s.peekFirst === i;
      const isPeekTwo = peekSet.has(i);
      const isOwned = c.owner !== null;

      cell.className = 'card';
      cell.textContent = '';
      if (isOwned) {
        cell.classList.add('face', c.owner === 'p1' ? 'owned-p1' : 'owned-p2');
        cell.textContent = c.emoji;
      } else if (isPeekFirst || isPeekTwo) {
        cell.classList.add('face', 'peek');
        cell.textContent = c.emoji;
      } else {
        cell.classList.add('facedown');
        if (myTurn) cell.classList.add('can-flip');
      }
    }

    // Status
    statusBar.className = 'status-bar';
    if (!s.p2 && mySlot === 'p1') {
      statusBar.textContent = '⏳ Чекаємо другого гравця…';
      statusBar.classList.add('waiting');
    } else if (!s.p1) {
      statusBar.textContent = '⏳ Чекаємо першого гравця…';
      statusBar.classList.add('waiting');
    } else if (s.winner === 'tie') {
      statusBar.textContent = `🤝 Нічия! ${s.score.p1}–${s.score.p2}`;
      statusBar.classList.add('over', 'tie');
    } else if (s.winner) {
      const winName = s[s.winner]?.name || '?';
      if (s.winner === mySlot) {
        statusBar.textContent = `🏆 Ти переміг! ${s.score.p1}–${s.score.p2}`;
        statusBar.classList.add('over', 'win');
      } else if (mySlot === 'observer') {
        statusBar.textContent = `🏆 Виграв ${winName} ${s.score.p1}–${s.score.p2}`;
        statusBar.classList.add('over', 'win');
      } else {
        statusBar.textContent = `💀 Виграв ${winName} ${s.score.p1}–${s.score.p2}`;
        statusBar.classList.add('over', 'lose');
      }
    } else if (s.peekTwo) {
      statusBar.textContent = '🚫 Не пара! Запам\'ятай і чекай…';
      statusBar.classList.add('waiting');
    } else if (mySlot === 'observer') {
      const turnName = s[s.turn]?.name || '?';
      statusBar.textContent = `👀 Дивишся. Хід: ${turnName}`;
      statusBar.classList.add('waiting');
    } else if (s.turn === mySlot) {
      if (s.peekFirst !== null) {
        statusBar.textContent = '▶ Друга картка — знайди пару';
      } else {
        statusBar.textContent = '▶ Твій хід — перевернь картку';
      }
      statusBar.classList.add('your-turn');
    } else {
      const opName = (mySlot === 'p1' ? s.p2 : s.p1)?.name || '?';
      statusBar.textContent = `⏳ Хід ${opName}…`;
      statusBar.classList.add('waiting');
    }

    newBtn.style.display = (s.winner && (mySlot === 'p1' || mySlot === 'p2')) ? 'inline-block' : 'none';
    roundN.textContent = s.round;
  }

  // Init: auto-rejoin / auto-observer + завжди стартуємо polling
  (async () => {
    const r = await api('GET');
    if (r.ok) {
      lastState = r.state;
      if (r.state.p1?.id === playerId || r.state.p2?.id === playerId) {
        mySlot = r.state.p1?.id === playerId ? 'p1' : 'p2';
        myName = (mySlot === 'p1' ? r.state.p1 : r.state.p2).name;
        nameEntryEl.style.display = 'none';
        gameEl.classList.add('active');
      } else if (r.state.p1 && r.state.p2) {
        // Обидва слоти зайняті — глядач без потреби вводити імʼя
        mySlot = 'observer';
        nameEntryEl.style.display = 'none';
        gameEl.classList.add('active');
      }
      render();
    }
    startPolling();
  })();
</script>

</body>
</html>
